name: Create release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get addon info
        id: addon
        run: |
          VERSION=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' addon.xml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Kodi zip
        run: |
          mkdir -p service.flicklist.scrobbler
          cp -r addon.xml service.py default.py icon.png resources CHANGELOG.md service.flicklist.scrobbler/
          [ -f LICENSE ] && cp LICENSE service.flicklist.scrobbler/
          zip -r service.flicklist.scrobbler-${{ steps.addon.outputs.version }}.zip service.flicklist.scrobbler/

      - name: Extract release notes
        id: notes
        run: |
          awk '/^## v/{if(found) exit; found=1; next} found{print}' CHANGELOG.md > release_notes.txt
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: FlickList Scrobbler v${{ steps.addon.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: service.flicklist.scrobbler-${{ steps.addon.outputs.version }}.zip

      - name: Build Pages site
        run: |
          mkdir -p _site/packages
          cp service.flicklist.scrobbler-*.zip _site/packages/
          ls -la _site/packages/
          cat > _site/index.html << 'PAGEEOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>FlickList Kodi Scrobbler</title></head>
          <body><h1>FlickList Scrobbler for Kodi</h1>
          <p><a href="https://github.com/flicklist/flks/releases/latest">Download latest release</a></p>
          </body></html>
          PAGEEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
